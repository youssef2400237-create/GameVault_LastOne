<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <link rel="stylesheet" href="profile.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <div class="profile-container">
      <div class="profile-header">
        <img src="https://i.pravatar.cc/250" alt="Profile" class="avatar" />

        <h1>Ahmed Nasser</h1>

        <span class="level-badge">
          <i class="fa-solid fa-gamepad"></i>
          Level 18 Gamer
        </span>
        <p class="bio">
          Passionate gamer who loves RPG, Action and Open World games.
        </p>
        <div class="header-buttons">
          <button class="edit-btn">
            <i class="fa-solid fa-pen"></i>
            Edit Profile
          </button>

          <button class="logout-btn">
            <i class="fa-solid fa-right-from-bracket"></i>
            Logout
          </button>
        </div>
      </div>
      <div class="stats-grid">
        <div class="card">
          <i class="fa-solid fa-cart-shopping"></i>
          <h2>24</h2>
          <p>Orders</p>
        </div>

        <div class="card">
          <i class="fa-solid fa-gamepad"></i>
          <h2>16</h2>
          <p>Owned Games</p>
        </div>

        <div class="card">
          <i class="fa-solid fa-wallet"></i>
          <h2>$245</h2>
          <p>Wallet</p>
        </div>

        <div class="card">
          <i class="fa-solid fa-trophy"></i>
          <h2>12</h2>
          <p>Achievements</p>
        </div>
      </div>

      <div class="section">
        <h2>Account Information</h2>

        <div class="info-box">
          <div class="info-item">
            <span>Email</span>
            <p>ahmed@gmail.com</p>
          </div>

          <div class="info-item">
            <span>Country</span>
            <p>Egypt</p>
          </div>

          <div class="info-item">
            <span>Member Since</span>
            <p>2025</p>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>Favorite Games</h2>

        <div class="games">
          <div class="game-card">
            <img src="https://picsum.photos/300/180?1" />
            <h3>Cyberpunk 2077</h3>
          </div>
          <div class="game-card">
            <img src="https://picsum.photos/300/180?2" />
            <h3>GTA V</h3>
          </div>
          <div class="game-card">
            <img src="https://picsum.photos/300/180?3" />
            <h3>Elden Ring</h3>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
